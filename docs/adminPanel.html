<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Menutech</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .admin-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            flex: 1;
            height: calc(100vh - 80px);
            overflow: hidden;
        }

        /* Sidebar Styling */
        .admin-sidebar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(124, 77, 255, 0.2);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .sidebar-section h3 {
            color: var(--secondary-color);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-item {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #cbd5e1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(124, 77, 255, 0.1);
            color: white;
            border-left: 3px solid var(--primary-color);
        }

        .sidebar-item i {
            font-size: 0.8rem;
            opacity: 0.5;
        }

        /* Main Content Styling */
        .admin-main {
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(124, 77, 255, 0.1);
        }

        .header-info h2 {
            margin: 0;
            color: var(--text-highlight);
        }

        .header-info p {
            margin: 5px 0 0 0;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        /* Forms & Inputs */
        .admin-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #0f172a;
            border: 1px solid rgba(124, 77, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-family: inherit;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        /* Question List */
        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .question-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 10px;
            padding: 1rem;
            border-left: 4px solid var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .question-card:hover {
            transform: translateX(5px);
            background: rgba(15, 23, 42, 0.9);
        }

        .q-info h4 {
            margin: 0;
            color: #f1f5f9;
        }

        .q-info span {
            font-size: 0.75rem;
            color: var(--secondary-color);
            text-transform: uppercase;
        }

        .q-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 5px;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .icon-btn:hover {
            color: white;
        }

        .icon-btn.delete:hover {
            color: var(--error);
        }

        /* Modal Overlays */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(5px);
        }

        .overlay.active {
            display: flex;
        }

        .modal-box {
            background: #1e293b;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--primary-color);
        }

        /* Utils */
        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .small-btn {
            padding: 5px 10px;
            font-size: 0.7rem;
            border-radius: 4px;
        }

        #btn-save-all {
            background: var(--success);
            border-color: var(--success);
        }
    </style>
</head>
<body>
    <header style="padding: 1rem 2rem; background: rgba(11, 17, 33, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div class="logo">
                <img src="https://menutech.services/assets/img/logomt.png" alt="Menutech Logo" class="main-logo">
                <span style="color: white; margin-left: 1rem; font-size: 1.2rem; font-weight: 300;">| Admin Panel</span>
            </div>
            <div class="btn-group">
                <a href="index.html" class="modal-btn secondary small-btn" style="text-decoration: none; padding: 0.5rem 1rem;">
                    <i class="fas fa-eye"></i> Ver App
                </a>
                <button id="btn-save-all" class="modal-btn" style="padding: 0.5rem 1rem;">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
            </div>
        </div>
    </header>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-section">
                <h3>Materias <button class="icon-btn" onclick="addNewSubject()"><i class="fas fa-plus-circle"></i></button></h3>
                <ul class="sidebar-list" id="subject-list">
                    <!-- Loaded via JS -->
                </ul>
            </div>

            <div class="sidebar-section" id="levels-section" style="display:none;">
                <h3>Niveles <button class="icon-btn" onclick="addNewLevel()"><i class="fas fa-plus-circle"></i></button></h3>
                <ul class="sidebar-list" id="level-list">
                    <!-- Loaded via JS -->
                </ul>
            </div>

            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <p style="font-size: 0.7rem; color: #64748b; margin-bottom: 0.5rem;">Backup / Portabilidad:</p>
                <button onclick="exportJSON()" class="modal-btn secondary" style="width: 100%; font-size: 0.8rem; margin-bottom: 0.5rem;">
                    <i class="fas fa-download"></i> Exportar JSON
                </button>
                <button onclick="document.getElementById('import-file').click()" class="modal-btn secondary" style="width: 100%; font-size: 0.8rem;">
                    <i class="fas fa-upload"></i> Importar JSON
                </button>
                <input type="file" id="import-file" style="display:none" accept=".json" onchange="importJSON(this)">
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main" id="admin-main">
            <div id="welcome-screen" style="text-align: center; margin-top: 5rem; color: #94a3b8;">
                <i class="fas fa-cogs" style="font-size: 5rem; margin-bottom: 2rem; opacity: 0.2;"></i>
                <h1>Bienvenido al Panel de Configuración</h1>
                <p>Selecciona una materia y un nivel en el panel izquierdo para comenzar a editar.</p>
            </div>

            <!-- Level Editor (Hidden by default) -->
            <div id="level-editor" style="display:none;">
                <div class="content-header">
                    <div class="header-info">
                        <h2 id="edit-level-title">Nivel X: Nombre</h2>
                        <p id="edit-level-subtitle">Materia: XXX</p>
                    </div>
                    <div class="btn-group">
                        <button class="modal-btn secondary" onclick="editLevelBasics()">
                            <i class="fas fa-edit"></i> Editar Lección
                        </button>
                        <button class="modal-btn" onclick="addNewQuestion()">
                            <i class="fas fa-plus"></i> Nueva Pregunta
                        </button>
                    </div>
                </div>

                <div style="margin-top: 2rem;">
                    <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
                        Preguntas del Nivel
                        <span class="badge" style="background: var(--primary-color);" id="q-count">0</span>
                    </h3>
                    <div class="questions-list" id="questions-list">
                        <!-- Loaded via JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-lesson" class="overlay">
        <div class="modal-box">
            <h2>Configurar Lección</h2>
            <div class="form-group">
                <label>Título de la Lección</label>
                <input type="text" id="lesson-title">
            </div>
            <div class="form-group">
                <label>Contenido HTML (Explicación)</label>
                <textarea id="lesson-content"></textarea>
            </div>
            <div class="btn-group" style="justify-content: flex-end;">
                <button class="modal-btn secondary" onclick="closeModal('modal-lesson')">Cancelar</button>
                <button class="modal-btn" onclick="saveLesson()">Guardar Lección</button>
            </div>
        </div>
    </div>

    <div id="modal-question" class="overlay">
        <div class="modal-box" style="max-width: 900px;">
            <h2 id="question-modal-title">Editar Pregunta</h2>
            <div class="admin-card" style="margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label>Tipo de Pregunta</label>
                    <select id="q-type" onchange="renderQuestionFields()">
                        <option value="quiz-item">Opción Múltiple (Quiz)</option>
                        <option value="speech-practice">Pronunciación (Speaking)</option>
                        <option value="listening-practice">Comprensión (Listening)</option>
                        <option value="builder">SQL Builder</option>
                        <option value="sorter">Pseudocódigo (Sorter)</option>
                        <option value="flowchart-free">Diagrama de Flujo</option>
                        <option value="match">Emparejamiento (Match)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Título / Identificador</label>
                    <input type="text" id="q-title" placeholder="Ej: Pregunta 1: Selectores">
                </div>
                <div class="form-group" id="q-instruction-group">
                    <label>Instrucciones / Texto de Pregunta</label>
                    <textarea id="q-instruction"></textarea>
                </div>
            </div>

            <!-- Dynamic Fields per Type -->
            <div id="dynamic-fields" class="admin-card" style="margin-bottom: 1.5rem;">
                <!-- Filled via JS -->
            </div>

            <div class="btn-group" style="justify-content: flex-end;">
                <button class="modal-btn secondary" onclick="closeModal('modal-question')">Cancelar</button>
                <button class="modal-btn" onclick="saveQuestion()">Guardar Pregunta</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="admin.js"></script>
</body>
</html>
